lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    devDependencies:
      typescript:
        specifier: 5.3.0
        version: 5.3.0

  packages/api:
    dependencies:
      '@pnpm-monorepo/shared':
        specifier: workspace:*
        version: link:../shared
      fastify:
        specifier: 4.25.0
        version: 4.25.0

  packages/shared:
    dependencies:
      zod:
        specifier: 3.22.0
        version: 3.22.0

  packages/web:
    dependencies:
      '@pnpm-monorepo/shared':
        specifier: workspace:*
        version: link:../shared
      vue:
        specifier: 3.4.0
        version: 3.4.0

packages:

  fastify@4.25.0:
    resolution: {integrity: sha512-fake-integrity-hash-for-fixture==}
    engines: {node: '>=18'}

  typescript@5.3.0:
    resolution: {integrity: sha512-fake-integrity-hash-for-fixture==}
    engines: {node: '>=14.17'}
    hasBin: true

  vue@3.4.0:
    resolution: {integrity: sha512-fake-integrity-hash-for-fixture==}

  zod@3.22.0:
    resolution: {integrity: sha512-fake-integrity-hash-for-fixture==}

snapshots:

  fastify@4.25.0: {}

  typescript@5.3.0: {}

  vue@3.4.0: {}

  zod@3.22.0: {}
