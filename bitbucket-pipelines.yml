# Bitbucket Pipelines configuration for Verimu
#
# Runs tests on Node.js 20, then self-scans to generate
# a CRA-compliant SBOM of the verimu project itself.

image: node:20

definitions:
  caches:
    npm: node_modules

pipelines:
  default:
    - step:
        name: Test (Node.js 20)
        caches:
          - npm
        script:
          - npm ci
          - npm run build:check
          - npm test
          - npm run build

    - step:
        name: Test (Node.js 22)
        image: node:22
        caches:
          - npm
        script:
          - npm ci
          - npm run build:check
          - npm test
          - npm run build

    - step:
        name: Self-scan (SBOM generation)
        caches:
          - npm
        script:
          - npm ci
          - npm run build
          - node scripts/run-scan.mjs
        artifacts:
          - test-sbom.keep.cdx.json

  branches:
    main:
      - step:
          name: Test (Node.js 20)
          caches:
            - npm
          script:
            - npm ci
            - npm run build:check
            - npm test
            - npm run build

      - step:
          name: Test (Node.js 22)
          image: node:22
          caches:
            - npm
          script:
            - npm ci
            - npm run build:check
            - npm test
            - npm run build

      - step:
          name: Self-scan (SBOM generation)
          caches:
            - npm
          script:
            - npm ci
            - npm run build
            - node scripts/run-scan.mjs
          artifacts:
            - test-sbom.keep.cdx.json

  tags:
    '*':
      - step:
          name: Test (Node.js 20)
          caches:
            - npm
          script:
            - npm ci
            - npm run build:check
            - npm test
            - npm run build

      - step:
          name: Test (Node.js 22)
          image: node:22
          caches:
            - npm
          script:
            - npm ci
            - npm run build:check
            - npm test
            - npm run build

      - step:
          name: Publish to npm (tag)
          caches:
            - npm
          script:
            - |
              if ! echo "$BITBUCKET_TAG" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
                echo "Tag $BITBUCKET_TAG is not a valid semver release tag."
                exit 1
              fi
            - |
              TAG_VERSION="${BITBUCKET_TAG#v}"
              PKG_VERSION="$(node -p "require('./package.json').version")"
              if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
                echo "Tag version ($BITBUCKET_TAG) does not match package.json version ($PKG_VERSION)."
                exit 1
              fi
            - |
              git fetch origin main
              if ! git branch -r --contains "$BITBUCKET_COMMIT" | grep -q "origin/main"; then
                echo "Release tag commit is not on main."
                exit 1
              fi
            - |
              if [ -z "$NPM_TOKEN" ]; then
                echo "NPM_TOKEN repository variable is required."
                exit 1
              fi
              echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
            - npm ci
            - npm publish --access public
