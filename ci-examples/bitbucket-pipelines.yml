# Bitbucket Pipelines configuration for Verimu
#
# Copy this file to your repository root as bitbucket-pipelines.yml
# to run Verimu tests and generate SBOMs in Bitbucket Pipelines.

image: node:20

definitions:
  caches:
    npm: node_modules

pipelines:
  default:
    # ─── Test Step ─────────────────────────────────────────────
    - step:
        name: Test
        caches:
          - npm
        script:
          - npm ci
          - npm run build:check
          - npm test
          - npm run build

    # ─── SBOM Generation Step ──────────────────────────────────
    - step:
        name: Generate SBOM
        caches:
          - npm
        script:
          - npm ci
          - npm run build
          - node scripts/run-scan.mjs
        artifacts:
          - "*.cdx.json"

  # ─── Branch-specific pipelines ─────────────────────────────────
  branches:
    main:
      - step:
          name: Test
          caches:
            - npm
          script:
            - npm ci
            - npm run build:check
            - npm test
            - npm run build

      - step:
          name: Generate SBOM
          caches:
            - npm
          script:
            - npm ci
            - npm run build
            - node scripts/run-scan.mjs
          artifacts:
            - "*.cdx.json"

# ─── Example: Python project scan ─────────────────────────────────
