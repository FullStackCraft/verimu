# GitLab CI configuration for Verimu
#
# Copy this file to your repository root as .gitlab-ci.yml
# to run Verimu tests and generate SBOMs in GitLab CI.

stages:
  - test
  - scan

variables:
  NODE_VERSION: "20"

# ─── Test Stage ──────────────────────────────────────────────────

test:
  stage: test
  image: node:${NODE_VERSION}
  script:
    - npm ci
    - npm run build:check
    - npm test
    - npm run build
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/

# ─── SBOM Generation Stage ──────────────────────────────────────
#
# Example: Generate an SBOM for the project itself.
# In real usage, replace `scripts/run-scan.mjs` with your
# project-specific scan configuration.

sbom:
  stage: scan
  image: node:${NODE_VERSION}
  needs: ["test"]
  script:
    - npm ci
    - npm run build
    - node scripts/run-scan.mjs
  artifacts:
    paths:
      - "*.cdx.json"
    expire_in: 30 days

