# GitHub Actions workflow for Verimu SBOM generation
#
# Copy this file to your repository at .github/workflows/verimu.yml
# to generate CRA-compliant SBOMs on every push and PR.
#
# Supports all ecosystems: npm, NuGet, pip, Cargo, Maven, Go, Ruby.

name: Verimu CRA Compliance Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  # ─── npm / Node.js ──────────────────────────────────────────────

  scan-npm:
    name: SBOM — npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Verimu
        run: npm install -g verimu

      - name: Generate SBOM
        run: verimu scan --path .

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-npm
          path: sbom.cdx.json
          retention-days: 90

